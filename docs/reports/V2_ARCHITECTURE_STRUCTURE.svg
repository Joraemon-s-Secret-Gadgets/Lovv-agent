  <path class="edge-blue" d="M 450 273 L 492 273"/>
  <path class="edge-blue" d="M 644 273 L 690 273"/>
  <path class="edge" d="M 856 304 L 856 330"/>
  <path class="edge" d="M 856 382 L 856 408"/>
  <path class="edge-blue" d="M 1022 343 L 1058 343"/>
  <path class="edge-dashed" d="M 1022 214 L 1058 214"/>
  <path class="edge-dashed" d="M 1160 250 L 1160 304"/>
  <path class="edge-blue" d="M 1160 382 L 1160 430"/>
  <path class="edge-blue" d="M 1058 469 C 760 548 420 448 220 321"/>
  <path class="edge" d="M 856 150 L 856 176"/>
  <path class="edge" d="M 1262 469 C 1326 469 1348 418 1374 382"/>
  <path class="edge-dashed" d="M 1374 366 C 1290 366 1330 273 1262 273"/>

  <text class="tiny" x="225" y="264">request</text>
  <text class="tiny" x="1178" y="416">interrupt</text>
  <text class="tiny" x="1280" y="448">checkpoint 저장</text>
  <text class="tiny" x="1284" y="348">resume 분기</text>

  <rect class="container-green" x="48" y="604" width="580" height="342"/>
  <text class="section-title" x="78" y="640">핵심 데이터 계약</text>

  <rect class="box-green" x="78" y="670" width="250" height="98"/>
  <text class="label" x="112" y="700">CitySelectionResult</text>
  <text class="small" x="98" y="724">selected_city, rankings, mode</text>
  <text class="small" x="98" y="746">도시 변경 요청 때만 재생성</text>

  <rect class="box-green" x="350" y="670" width="242" height="98"/>
  <text class="label" x="420" y="700">PlacePool</text>
  <text class="small" x="373" y="724">recommended / reserve / audit</text>
  <text class="small" x="373" y="746">수정 루프에서 갱신</text>

  <rect class="box-green" x="78" y="802" width="514" height="108"/>
  <text class="label" x="250" y="832">PlannerInput</text>
  <text class="small" x="104" y="858">status, selected_city, places, festival_candidates,</text>
  <text class="small" x="104" y="880">external_link_themes, candidate_reason_claims</text>
  <text class="tiny" x="104" y="902">Planner가 실제로 필요한 최소 입력만 전달</text>

  <path class="edge" d="M 328 719 L 350 719"/>
  <path class="edge" d="M 203 768 C 203 788 225 802 260 802"/>
  <path class="edge" d="M 471 768 C 471 788 445 802 408 802"/>

  <rect class="container-purple" x="672" y="604" width="878" height="342"/>
  <text class="section-title" x="702" y="640">자연어 수정 루프 - resume 기반</text>
  <text class="small" x="704" y="663">수정 횟수 제한 없음 · 입력 중단 후 TTL 기반 종료 · 필요 시 city_id 고정 DynamoDB 재인출</text>

  <rect class="box-slate" x="704" y="704" width="146" height="68"/>
  <text class="label" x="742" y="733">사용자</text>
  <text class="tiny" x="726" y="754">“2일차 바꿔줘”</text>

  <rect class="box-purple" x="888" y="704" width="146" height="68"/>
  <text class="label" x="914" y="733">resume</text>
  <text class="tiny" x="919" y="754">thread_id</text>

  <rect class="box-purple" x="1072" y="704" width="158" height="68"/>
  <text class="label" x="1104" y="733">수정 Intent</text>
  <text class="tiny" x="1098" y="754">슬롯 / 범위 해석</text>

  <rect class="box-yellow" x="1268" y="704" width="204" height="68"/>
  <text class="label" x="1304" y="733">Pool 확인</text>
  <text class="tiny" x="1291" y="754">reserve 우선, 소진 시 재인출</text>

  <rect class="box-red" x="1000" y="824" width="236" height="72"/>
  <text class="label" x="1050" y="854">DynamoDB lookup</text>
  <text class="tiny" x="1030" y="876">city_id 고정 + theme_tags 필터</text>

  <rect class="box-green" x="1268" y="824" width="204" height="72"/>
  <text class="label" x="1310" y="854">Planner 재실행</text>
  <text class="tiny" x="1296" y="876">부분 / 전체 재배치</text>

  <path class="edge" d="M 850 738 L 888 738"/>
  <path class="edge" d="M 1034 738 L 1072 738"/>
  <path class="edge" d="M 1230 738 L 1268 738"/>
  <path class="edge" d="M 1370 772 L 1370 824"/>
  <path class="edge-dashed" d="M 1268 738 C 1164 738 1118 780 1118 824"/>
  <path class="edge" d="M 1236 860 L 1268 860"/>
  <path class="edge-blue" d="M 1472 860 C 1518 860 1518 694 1472 694 C 1330 694 1210 662 1040 662 C 940 662 876 676 777 704"/>
  <text class="tiny" x="1316" y="818">수정된 일정 반환 + interrupt</text>

  <rect class="container-slate" x="48" y="982" width="1502" height="92"/>
  <text class="section-title" x="78" y="1018">개발 및 배포 경계</text>
  <text class="body" x="80" y="1048">src/lovv_agent/agents/city_selection, planner, intent, shared로 모듈 분리 개발 → pytest / integration → build → deploy</text>
  <text class="label" x="1132" y="1048">단일 LovvAgentV1 AgentCore Runtime</text>
  <text class="tiny" x="1162" y="1068">별도 AgentCore Runtime 분리 없음 · us-east-1 · V1 Observability/CI/CD 유지</text>
</svg>
