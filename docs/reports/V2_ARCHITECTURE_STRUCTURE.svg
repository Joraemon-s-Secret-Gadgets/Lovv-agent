<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Lovv Agent V2 architecture structure</title>
  <desc id="desc">Architecture diagram derived from docs/reports/V2_ARCHITECTURE_DECISIONS.md</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 20px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 15px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #334155; }
      .small { font: 400 13px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #475569; }
      .tiny { font: 400 12px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .container-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .container-orange { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 12; }
      .container-purple { fill: #faf5ff; stroke: #9333ea; stroke-width: 2; rx: 12; }
      .container-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .container-slate { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 12; }
      .box-blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.8; rx: 10; }
      .box-orange { fill: #fed7aa; stroke: #f97316; stroke-width: 1.8; rx: 10; }
      .box-yellow { fill: #fef3c7; stroke: #d97706; stroke-width: 1.8; rx: 10; }
      .box-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.8; rx: 10; }
      .box-purple { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.8; rx: 10; }
      .box-slate { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .box-red { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.8; rx: 10; }
      .edge { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .edge-blue { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow-blue); }
      .edge-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .note-line { stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1120"/>
  <text class="title" x="56" y="58">Lovv Agent V2 Architecture Structure</text>
  <text class="subtitle" x="58" y="88">Source: docs/reports/V2_ARCHITECTURE_DECISIONS.md · Working Draft 기준일 2026-06-25</text>

  <g transform="translate(1268 34)">
    <rect class="box-slate" x="0" y="0" width="270" height="76"/>
    <circle cx="22" cy="24" r="7" fill="#2563eb"/>
    <text class="tiny" x="40" y="29">Main graph / runtime flow</text>
    <circle cx="22" cy="49" r="7" fill="#f97316"/>
    <text class="tiny" x="40" y="54">city_select subgraph</text>
  </g>

  <rect class="box-slate" x="48" y="238" width="172" height="92"/>
  <text class="label" x="84" y="273">User / Front</text>
  <text class="body" x="74" y="299">초회 요청</text>
  <text class="small" x="71" y="319">자연어 수정 입력</text>

  <rect class="container-blue" x="260" y="130" width="1058" height="430"/>
  <text class="section-title" x="285" y="164">V2 Main Graph - 초회 생성 경로</text>
  <text class="small" x="286" y="187">HITL 후보 번호 선택과 빌더 루프는 폐기하고, 생성 후 자연어 수정 루프로 전환</text>

  <rect class="box-blue" x="300" y="235" width="150" height="76"/>
  <text class="label" x="329" y="266">Intent</text>
  <text class="small" x="325" y="289">요청 해석</text>

  <rect class="box-blue" x="492" y="235" width="152" height="76"/>
  <text class="label" x="525" y="266">Supervisor</text>
  <text class="small" x="520" y="289">초회 / resume 분기</text>

  <rect class="container-orange" x="690" y="176" width="332" height="300"/>
  <text class="section-title" x="720" y="210">city_select subgraph</text>
  <text class="small" x="727" y="232">A2A-ready 경계 · 부분 재실행 진입점</text>

  <rect class="box-orange" x="722" y="252" width="268" height="52"/>
  <text class="label" x="760" y="275">retrieval_agent</text>
  <text class="tiny" x="749" y="294">S3 Vector 검색 + merge + prune</text>

  <rect class="box-orange" x="722" y="330" width="268" height="52"/>
  <text class="label" x="765" y="353">scoring_agent</text>
  <text class="tiny" x="748" y="372">theme_weights + scoring.py 개선</text>

  <rect class="box-orange" x="722" y="408" width="268" height="52"/>
  <text class="label" x="761" y="431">selection_agent</text>
  <text class="tiny" x="746" y="450">도시 확정 + quota + reason claims</text>

  <rect class="box-yellow" x="1058" y="178" width="204" height="72"/>
  <text class="label" x="1092" y="208">Festival Verifier</text>
  <text class="small" x="1110" y="231">optional fan-out</text>

  <rect class="box-green" x="1058" y="304" width="204" height="78"/>
  <text class="label" x="1120" y="335">Planner</text>
  <text class="small" x="1084" y="358">초회 생성 + 수정 모드</text>

  <rect class="box-green" x="1058" y="430" width="204" height="78"/>
  <text class="label" x="1086" y="461">Response Packager</text>
  <text class="small" x="1094" y="484">일정 반환 + interrupt</text>

  <rect class="box-purple" x="690" y="92" width="332" height="58"/>
  <text class="label" x="746" y="116">Profile Agent read</text>
  <text class="small" x="736" y="137">theme_weights를 CitySelectState로 주입</text>

  <rect class="container-purple" x="1350" y="178" width="200" height="270"/>
  <text class="section-title" x="1382" y="212">Memory</text>
  <rect class="box-purple" x="1374" y="232" width="152" height="76"/>
  <text class="label" x="1392" y="263">Checkpoint</text>
  <text class="small" x="1400" y="286">UnifiedAgentState</text>
  <rect class="box-purple" x="1374" y="328" width="152" height="76"/>
  <text class="label" x="1404" y="359">Resume</text>
  <text class="small" x="1402" y="382">thread_id + TTL</text>

